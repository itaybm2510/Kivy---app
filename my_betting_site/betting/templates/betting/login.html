<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BetX24 | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030712; font-family: system-ui, -apple-system, sans-serif; }
        .neon-box { box-shadow: 0 0 20px rgba(6, 182, 212, 0.15); border: 1px solid rgba(6, 182, 212, 0.25); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-center items-center p-4 max-w-md mx-auto">
    <div class="w-full bg-[#0b0f17] p-8 rounded-2xl neon-box space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-black tracking-wider text-cyan-400 font-serif">BetX24</h1>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Sign in to your account</p>
        </div>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 tracking-wide">Username</label>
                <input type="text" name="username" required class="w-full bg-[#111827] border border-gray-700 rounded-xl px-4 py-3 text-sm font-semibold text-cyan-400 focus:outline-none focus:border-cyan-500 transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-1 tracking-wide">Password</label>
                <input type="password" name="password" required class="w-full bg-[#111827] border border-gray-700 rounded-xl px-4 py-3 text-sm font-semibold text-cyan-400 focus:outline-none focus:border-cyan-500 transition-all">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 text-black font-black py-3 rounded-xl shadow-lg transform active:scale-95 transition-all text-sm uppercase tracking-wider mt-2">Login</button>
        </form>

        <div class="text-center text-xs text-gray-500">
            Don't have an account? <a href="/register/" class="text-cyan-400 font-bold hover:underline">Create account</a>
        </div>
    </div>
</body>
</html>
