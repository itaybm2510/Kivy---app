<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetX24 | Neon Roulette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; font-family: system-ui, sans-serif; }
        .neon-glow { text-shadow: 0 0 10px #06b6d4; }
        .wheel-spin { animation: spin 0.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-white min-h-screen max-w-md mx-auto shadow-2xl p-6 bg-[#020617] flex flex-col justify-between">

    <div class="space-y-6">
        <div class="flex justify-between items-center pb-4 border-b border-gray-900">
            <a href="/" class="text-gray-400 hover:text-white"><i class="fa-solid fa-arrow-left text-lg"></i></a>
            <h1 class="text-xl font-black text-white tracking-wider neon-glow">NEON ROULETTE</h1>
            <div id="balance-display" class="bg-[#0f172a] px-3 py-1 rounded-full border border-cyan-500/30 text-cyan-400 font-black text-xs">
                ₪{{ balance }}
            </div>
        </div>

        <div class="flex flex-col items-center justify-center p-6 bg-[#050b14] border border-gray-900 rounded-2xl relative overflow-hidden">
            <div id="wheel-graphic" class="w-28 h-28 rounded-full border-4 border-dashed border-cyan-500/40 flex items-center justify-center text-3xl font-black transition-transform duration-300">
                <i class="fa-solid fa-circle-dot text-cyan-500/20"></i>
            </div>
            <div id="result-display" class="text-center mt-4 h-6 text-sm font-bold tracking-wide text-gray-500 uppercase">
                Place your bet below
            </div>
        </div>

        <div class="bg-[#050b14] p-5 rounded-2xl border border-gray-900 space-y-4">
            <div class="space-y-1.5">
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest">Bet Amount</label>
                <input id="bet-amount" type="number" value="100" min="10" class="w-full bg-[#0f172a] border border-gray-950 rounded-xl px-4 py-3 text-sm font-black text-white focus:outline-none focus:border-cyan-500">
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest">Select Bet Zone</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setBetType('red')" id="btn-red" class="zone-btn p-3 bg-red-600/10 border border-red-500/30 rounded-xl font-bold text-xs uppercase tracking-wider text-red-400 transition-all">Red (x2)</button>
                    <button onclick="setBetType('black')" id="btn-black" class="zone-btn p-3 bg-gray-800/50 border border-gray-700 rounded-xl font-bold text-xs uppercase tracking-wider text-gray-300 transition-all">Black (x2)</button>
                    <button onclick="setBetType('number')" id="btn-number" class="zone-btn p-3 bg-cyan-600/10 border border-cyan-500/30 rounded-xl font-bold text-xs uppercase tracking-wider text-cyan-400 transition-all">Single (x36)</button>
                </div>
            </div>

            <div id="number-input-container" class="space-y-1.5 hidden">
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest">Target Number (0-36)</label>
                <input id="bet-value" type="number" min="0" max="36" value="7" class="w-full bg-[#0f172a] border border-gray-950 rounded-xl px-4 py-2.5 text-xs font-bold text-white focus:outline-none focus:border-cyan-500">
            </div>

            <button onclick="spinRoulette()" id="spin-btn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-3 rounded-xl text-xs uppercase tracking-widest transition-colors">
                Launch Ball
            </button>
        </div>
    </div>

    <script>
        let selectedType = 'red';
        document.getElementById('btn-red').style.borderColor = '#ef4444';
        document.getElementById('btn-red').style.backgroundColor = 'rgba(239, 68, 68, 0.3)';

        function setBetType(type) {
            selectedType = type;
            document.querySelectorAll('.zone-btn').forEach(b => {
                b.style.backgroundColor = '';
                b.style.borderColor = '';
            });
            
            if(type === 'red') {
                document.getElementById('btn-red').style.backgroundColor = 'rgba(239, 68, 68, 0.3)';
                document.getElementById('btn-red').style.borderColor = '#ef4444';
                document.getElementById('number-input-container').classList.add('hidden');
            } else if(type === 'black') {
                document.getElementById('btn-black').style.backgroundColor = 'rgba(156, 163, 175, 0.2)';
                document.getElementById('btn-black').style.borderColor = '#9ca3af';
                document.getElementById('number-input-container').classList.add('hidden');
            } else {
                document.getElementById('btn-number').style.backgroundColor = 'rgba(6, 182, 212, 0.3)';
                document.getElementById('btn-number').style.borderColor = '#06b6d4';
                document.getElementById('number-input-container').classList.remove('hidden');
            }
        }

        function spinRoulette() {
            const betAmount = document.getElementById('bet-amount').value;
            const betValue = document.getElementById('bet-value').value;
            const wheel = document.getElementById('wheel-graphic');
            const resultDisplay = document.getElementById('result-display');
            const spinBtn = document.getElementById('spin-btn');

            spinBtn.disabled = true;
            wheel.classList.add('wheel-spin');
            wheel.textContent = "?";
            wheel.className = "w-28 h-28 rounded-full border-4 border-dashed border-cyan-500 wheel-spin flex items-center justify-center text-3xl font-black text-cyan-400";
            resultDisplay.textContent = "Rolling the cylinder...";
            resultDisplay.className = "text-center mt-4 h-6 text-sm font-bold tracking-wide text-cyan-400 uppercase animate-pulse";

            fetch('/roulette/spin/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    bet: betAmount,
                    type: selectedType,
                    value: betValue
                })
            })
            .then(res => res.json())
            .then(data => {
                setTimeout(() => {
                    wheel.classList.remove('wheel-spin');
                    spinBtn.disabled = false;

                    if(data.status === 'error') {
                        alert(data.message);
                        wheel.innerHTML = '<i class="fa-solid fa-circle-dot text-cyan-500/20"></i>';
                        resultDisplay.textContent = "Transaction Declined";
                        resultDisplay.className = "text-center mt-4 h-6 text-sm font-bold tracking-wide text-red-500 uppercase";
                        return;
                    }

                    // עדכון ויזואלי של התוצאה
                    wheel.textContent = data.winning_number;
                    if(data.winning_color === 'red') {
                        wheel.className = "w-28 h-28 rounded-full border-4 border-red-500 bg-red-950/40 flex items-center justify-center text-4xl font-black text-red-400";
                    } else if(data.winning_color === 'black') {
                        wheel.className = "w-28 h-28 rounded-full border-4 border-gray-500 bg-gray-950/40 flex items-center justify-center text-4xl font-black text-gray-300";
                    } else {
                        wheel.className = "w-28 h-28 rounded-full border-4 border-emerald-500 bg-emerald-950/40 flex items-center justify-center text-4xl font-black text-emerald-400";
                    }

                    // הצגת תוצאת הזכייה
                    if(data.won) {
                        resultDisplay.textContent = `YOU WON ₪${data.payout}!`;
                        resultDisplay.className = "text-center mt-4 h-6 text-sm font-black tracking-wide text-emerald-400 uppercase";
                    } else {
                        resultDisplay.textContent = `House wins (${data.winning_color} ${data.winning_number})`;
                        resultDisplay.className = "text-center mt-4 h-6 text-sm font-bold tracking-wide text-gray-600 uppercase";
                    }

                    document.getElementById('balance-display').textContent = `₪${data.new_balance}`;
                }, 1500); // 1.5 שניות של סיבוב מותח
            });
        }
    </script>
</body>
</html>
