name: Build Kivy APK with Buildozer

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          git \
          libffi-dev \
          libssl-dev \
          libsqlite3-dev \
          python3-setuptools \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libgdbm-dev \
          libnspr4-dev \
          libreadline-dev \
          libffi-dev \
          bluez \
          libbluetooth-dev \
          squashfs-tools

        pip install --upgrade pip
        pip install --upgrade Cython==0.29.33 virtualenv buildozer

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # קבלת כל הרישיונות של ה-SDK באופן אוטומטי מלא
        yes | auth_cancel=1 sdkmanager --licenses || true

    - name: Build APK with Buildozer
      run: |
        # הרצה שמספקת אישור אוטומטי לכל שאילתה של בילדוזר
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
